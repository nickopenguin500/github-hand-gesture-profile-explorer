<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture GitHub Explorer</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="cursor"></div>

    <div class="container">
        <h1>GitHub Explorer</h1>
        <div class="search-box">
            <input type="text" id="username-input" placeholder="Enter GitHub Username">
            <button id="search-btn">Search (Pinch Here!)</button>
        </div>

        <div id="profile-card" class="hidden">
            <div class="profile-header">
                <img id="avatar" src="" alt="Profile Picture">
                <div>
                    <h2 id="name"></h2>
                    <p id="bio"></p>
                </div>
            </div>
            <div id="repo-list"></div>
        </div>
        
        <p id="error-message" class="error hidden"></p>
    </div>

    <video id="videoElement" width="320" height="240" autoplay playsinline muted style="border: 2px solid red; display: block; margin: 0 auto;"></video>
    <script src="vision.js"></script>
    <script src="github.js"></script>
    
    <script src="app.js"></script>
    
    <div id="repo-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-btn">← Back to List</button>
            <h2 id="modal-repo-name"></h2>
            
            <div id="repo-topics" class="topics-container"></div>
            
            <p id="modal-repo-desc"></p>
            <hr>
            
            <h4>Language Breakdown</h4>
            <div id="modal-language-bar" class="lang-bar-container"></div>
            <div id="modal-language-legend" class="lang-legend-container"></div>

            <hr>
            <h4>Recent Activity</h4>
            <div id="modal-commits" class="commits-container"></div>

            <hr>
            <div class="modal-stats">
                <p id="modal-repo-stars"></p>
                <p id="modal-repo-forks"></p>
                <p id="modal-repo-issues"></p>
                <p id="modal-repo-license"></p>
                <p id="modal-repo-size"></p>
            </div>
            <p id="modal-repo-updated" style="font-size: 12px; color: #8b949e; margin-bottom: 15px;"></p>
            <a id="modal-repo-link" target="_blank" style="color: #58a6ff; text-decoration: none;">View Repository on GitHub →</a>
        </div>
    </div>
</body>
</html>
