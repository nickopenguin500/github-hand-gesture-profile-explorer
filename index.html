<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture GitHub Explorer</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="cursor"></div>

    <div class="container">
        <h1>GitHub Explorer</h1>
        <div class="search-box">
            <input type="text" id="username-input" placeholder="Enter GitHub Username">
            <button id="search-btn">Search (Pinch Here!)</button>
        </div>

        <div id="profile-card" class="hidden">
            <img id="avatar" src="" alt="Profile Picture">
            <h2 id="name"></h2>
            <p id="bio"></p>
            <p>Public Repos: <span id="repos"></span></p>
        </div>
        
        <p id="error-message" class="error hidden"></p>
    </div>

    <video id="videoElement" style="display: none;" autoplay></video>

    <script src="github.js"></script>
    <script src="vision.js"></script>
    <script src="app.js"></script>
</body>
</html>
